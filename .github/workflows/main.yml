name: Build Android

on:
  push:
  workflow_dispatch:

jobs:
  buildAndroid:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
         sudo apt-get update
         sudo apt-get install -y build-essential clang g++ gcc libstdc++-12-dev

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.4

      - name: Setup Android SDK/NDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 33
          ndk-version: 25.2.9519653
          cmake-version: 3.24.1
          jdk-version: 17

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          key: android-build-cache
          path: |
            .haxelib/
            ~/.hxcpp
            export/release/android/haxe/
            export/release/android/obj/

      - name: Set environment
        run: |
          echo "HXCPP_COMPILE_CACHE=~/.hxcpp" >> $GITHUB_ENV
          export PATH="$HOME/haxelib/bin:$PATH"
          export ANDROID_SDK_ROOT=$ANDROID_HOME

      - name: Install Haxelib dependencies
        run: |
          haxelib setup ~/haxelib
          haxelib install hxcpp --quiet
          chmod +x ./setup/unix.sh
          sh ./setup/unix.sh

      - name: Lime Setup Android
        run: |
          printf "%s\n%s\n%s\n" \
          "$ANDROID_HOME" \
          "$ANDROID_NDK_ROOT" \
          "$JAVA_HOME" \
          | haxelib run lime setup android

      - name: Install Extension-AndroidTools
        run: haxelib git extension-androidtools https://github.com/LimeExtensions/extension-androidtools.git --skip-dependencies

      - name: hxcpp test
        run: haxelib install hxcpp 4.2.1

      - name: Compile Android
        run: haxelib run lime build android --app-version="4.0.0-${{ github.run_id}}" -D officialBuild

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: androidBuild
          path: export/release/android/bin/app/build/outputs/apk

      - name: Save cache
        uses: actions/cache@v4
        with:
          key: android-build-cache
          path: |
            .haxelib/
            ~/.hxcpp
            export/release/android/haxe/
            export/release/android/obj/
