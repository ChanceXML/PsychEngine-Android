name: Build Android

on:
  push:
  workflow_dispatch:

jobs:
  buildAndroid:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang g++ gcc

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-33"
          sdkmanager "build-tools;33.0.2"
          sdkmanager "ndk;21.4.7075529"

      - name: Set Android environment
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/21.4.7075529" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/21.4.7075529" >> $GITHUB_ENV
          echo "HXCPP_COMPILE_CACHE=$HOME/.hxcpp" >> $GITHUB_ENV

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          key: android-build-cache
          path: |
            ~/.haxelib
            ~/.hxcpp
            export/release/android/haxe
            export/release/android/obj

      - name: Install Haxelib dependencies
        run: |
         haxelib setup ~/haxelib
         haxelib install hxcpp 4.2.1 --quiet
         haxelib set hxcpp 4.2.1

      - name: Run setup script
        run: |
         chmod +x ./setup/unix.sh
         ./setup/unix.sh

      - name: Lime Setup Android
        run: |
          printf "%s\n%s\n%s\n" \
          "$ANDROID_HOME" \
          "$ANDROID_NDK_ROOT" \
          "$JAVA_HOME" \
          | haxelib run lime setup android

      - name: Install Extension-AndroidTools
        run: |
          haxelib git extension-androidtools https://github.com/LimeExtensions/extension-androidtools.git --skip-dependencies

      - name: Compile Android
        run: |
          haxelib run lime build android -release --app-version="4.0.0-${{ github.run_id}}" -D officialBuild

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: androidBuild
          path: export/release/android/bin/app/build/outputs/apk
