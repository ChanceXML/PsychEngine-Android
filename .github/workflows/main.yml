name: Android Build
run-name: ${{ github.event.inputs.name }}

on:
  workflow_dispatch:
    inputs:
      name:
        description: "Build Name"
        required: true
        default: "Android Build"
# woohoo
jobs:
  buildAndroid:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore build cache
        uses: actions/cache@v4
        with:
         path: |
          ~/.haxelib
          ~/.hxcpp
          export/release/android/haxe
          export/release/android/obj
         key: ${{ runner.os }}-android-${{ hashFiles('**/*.hx','**/*.xml','**/*.hxml') }}
         restore-keys: |
          ${{ runner.os }}-android-
      
      - name: Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang g++ gcc unzip wget

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Android NDK 21
        run: sdkmanager "ndk;21.4.7075529"

      - name: Set environment for HXCPP
        run: |
          echo "HXCPP_COMPILE_CACHE=$HOME/.hxcpp" >> $GITHUB_ENV
          echo "HXCPP_COMPILER=clang++" >> $GITHUB_ENV
          echo "HXCPP_CFLAGS=-stdlib=libc++ -I/usr/include/c++/v1" >> $GITHUB_ENV

      - name: Set Android environment
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/21.4.7075529" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/21.4.7075529" >> $GITHUB_ENV
          echo "PATH=$ANDROID_HOME/ndk/21.4.7075529/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH" >> $GITHUB_ENV
      
      - name: Setup Haxe
        uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.4
      
      - name: Install Haxelib and HXCPP
        run: |
          haxelib setup ~/haxelib
          haxelib install hxcpp 4.3.2 --quiet
          haxelib set hxcpp 4.3.2
      
      - name: Run setup script
        run: |
          chmod +x ./setup/unix.sh
          ./setup/unix.sh
          
      - name: Lime Setup Android
        run: |
          printf "%s\n%s\n%s\n" \
            "$ANDROID_HOME" \
            "$ANDROID_NDK_ROOT" \
            "$JAVA_HOME" \
            | haxelib run lime setup android
            
      - name: Install Extension-AndroidTools
        run: haxelib git extension-androidtools https://github.com/LimeExtensions/extension-androidtools.git --skip-dependencies
      - name: Install LuaJIT
        run: |
          rm -rf ~/haxelib/linc_luajit
          haxelib git linc_luajit https://github.com/superpowers04/linc_luajit
      
      - name: Build LuaJIT Android
        run: |
          cd ~/haxelib/linc_luajit/git
          haxelib run lime rebuild linc_luajit android -DANDROID_ARM64 -clean -verbose
      
      - name: Haxelib List
        run: haxelib list
      # building..
      - name: Compile Android
        run: |
          haxelib run lime build android \
          -release \
          -arm64 \
          -DLUA_ALLOWED \
          -Dlinc_luajit_static \
          -D officialBuild

      - name: Verify LuaJIT built
        run: |
          find ~/haxelib/linc_luajit -name "*.so"
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: androidBuild
          path: export/release/android/bin/app/build/outputs/apk

      - name: Save build cache
        uses: actions/cache@v4
        with:
         path: |
          ~/.haxelib
          ~/.hxcpp
          export/release/android/haxe
          export/release/android/obj
         key: ${{ runner.os }}-android-${{ hashFiles('**/*.hx','**/*.xml','**/*.hxml') }}
