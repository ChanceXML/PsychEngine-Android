name: Build Android

on:
  push:
  workflow_dispatch:

jobs:
  buildAndroid:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4.1.7

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          key: android-build-cache
          path: |
            ~/.haxelib
            ~/.hxcpp
            export/release/android/obj
            export/release/android/haxe

      - name: Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Android
        uses: android-actions/setup-android@v2

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.4

      - name: Install Haxelib
        run: |
          haxelib setup ~/haxelib
          haxelib install hxcpp > /dev/null --quiet
          chmod +x ./setup/unix.sh
          sh ./setup/unix.sh

      - name: Configure Lime for Android
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME
          haxelib run lime config ANDROID_SETUP true

      - name: Skip SScript setup mode
        run: echo 'oy9:showMacroty8:loopCosti25y10:includeAllfg' >> ~/settings.cocoa

      - name: Create Version Tag
        run: echo "${{github.run_id}}" > VERSION

      - name: Install Extension-AndroidTools
        run: haxelib git extension-androidtools https://github.com/LimeExtensions/extension-androidtools.git --skip-dependencies

      - name: Compile
        run: haxelib run lime build android --app-version="4.0.0-${{ github.run_id}}" -D officialBuild

      - name: Publish Artifact
        uses: actions/upload-artifact@v4.3.4
        with:
          name: androidBuild
          path: export/release/android/bin/app/build/outputs/apk
