name: Build Android

on:
  push:
  workflow_dispatch:

jobs:
  buildAndroid:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          key: android-build-cache
          path: |
            ~/.haxelib
            ~/.hxcpp
            export/release/android/haxe
            export/release/android/obj

      - name: Set environment for HXCPP
        run: |
          echo "HXCPP_COMPILE_CACHE=$HOME/.hxcpp" >> $GITHUB_ENV
          echo "HXCPP_COMPILER=clang++" >> $GITHUB_ENV
          echo "HXCPP_CFLAGS=-stdlib=libc++ -I/usr/include/c++/v1" >> $GITHUB_ENV
          export PATH="$HOME/haxelib/bin:$PATH"

      - name: Run Haxe/Android setup
        run: |
          chmod +x ./setup/unix.sh
          ./setup/unix.sh

      - name: Setup Android SDK/NDK
        uses: android-actions/setup-android@v2

      - name: Lime Setup Android
        run: |
          printf "%s\n%s\n%s\n" \
          "$ANDROID_HOME" \
          "$ANDROID_NDK_ROOT" \
          "$JAVA_HOME" \
          | haxelib run lime setup android

      - name: Install Extension-AndroidTools
        run: haxelib git extension-androidtools https://github.com/LimeExtensions/extension-androidtools.git --skip-dependencies

      - name: Compile Android Release
        run: haxelib run lime build android -release --app-version="4.0.0-${{ github.run_id}}" -D officialBuild

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: androidBuild
          path: export/release/android/bin/app/build/outputs/apk

      - name: Save build cache
        uses: actions/cache@v4
        with:
          key: android-build-cache
          path: |
            ~/.haxelib
            ~/.hxcpp
            export/release/android/haxe
            export/release/android/obj
